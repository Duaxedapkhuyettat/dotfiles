   font=unicode
else
insmod part_gpt
insmod ext2
search --no-floppy --fs-uuid --set=root 8902a5d8-1be8-4bb5-82cb-23f6e80eb507
    font="/usr/share/grub/unicode.pf2"
fi

if loadfont $font ; then
