insmod ext2
search --no-floppy --fs-uuid --set=root 8902a5d8-1be8-4bb5-82cb-23f6e80eb507
insmod gfxmenu
loadfont ($root)/boot/grub/themes/bigsur/DejaVuSans-48.pf2
loadfont ($root)/boot/grub/themes/bigsur/DejaVuSans-Regular-14.pf2
